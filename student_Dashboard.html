<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="CCSICTLOGOCROP.png">
    <title>DCH Student Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,tl',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* --- 1. COLOR PALETTE & GLOBAL STYLES --- */
        :root {
            /* Dark Mode Colors (Default) - Wise Wallet Green Theme with Black Backgrounds */
            --primary-bg: #000000;
            --secondary-bg: #0f0f0f;
            --accent-green: #9FE870;
            --text-primary: #FFFFFF;
            --text-secondary: #b8d6a0;
            --search-bg: #1a1a1a;
            --search-text: #FFFFFF;
            --card-border: #2d5514;
            --hover-bg: #1a1a1a;
            
            --banner-all-announcement: #1a1a1a;
            --banner-emergency: #D32F2F;
            --banner-deadline: #9FE870;
            --banner-news-updates: #1a1a1a;
            --banner-memo: #2d5514;
            --banner-notices: #7acc50;
        }

        /* Light Mode Colors - Wise Wallet Green Theme */
        body.light-mode {
            --primary-bg: #f5faf2;
            --secondary-bg: #FFFFFF;
            --accent-green: #7acc50;
            --text-primary: #163300;
            --text-secondary: #2d5514;
            --search-bg: #e8f5e0;
            --search-text: #163300;
            --card-border: #c9e5ba;
            --hover-bg: #e8f5e0;
            
            --banner-all-announcement: #e8f5e0;
            --banner-emergency: #D32F2F;
            --banner-deadline: #7acc50;
            --banner-news-updates: #e8f5e0;
            --banner-memo: #9FE870;
            --banner-notices: #9FE870;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-primary);
            padding: 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
            line-height: 1.6;
        }

        /* --- 2. HEADER STYLES --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--card-border);
        }

        .logo-section {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, var(--secondary-bg) 0%, var(--hover-bg) 100%);
            padding: 12px 20px;
            border-radius: 16px;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--card-border);
        }

        .logo-section:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(159, 232, 112, 0.2);
        }

        .logo-section img {
            border-radius: 12px;
            transition: transform 0.3s ease;
        }

        .logo-section:hover img {
            transform: rotate(5deg) scale(1.05);
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
        }
        
        .logo-text span {
            background: linear-gradient(135deg, var(--accent-green) 0%, #7acc50 100%);
            color: #000000;
            padding: 6px 12px;
            border-radius: 10px;
            margin-left: 4px;
            box-shadow: 0 4px 12px rgba(159, 232, 112, 0.3);
            font-weight: 700;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
        }

        nav a:hover {
            color: var(--accent-green);
            background-color: var(--hover-bg);
            transform: translateY(-2px);
        }

        nav a i {
            font-size: 1.1rem;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            background: linear-gradient(135deg, var(--secondary-bg) 0%, var(--hover-bg) 100%);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .theme-toggle:hover {
            background: linear-gradient(135deg, var(--accent-green) 0%, #7acc50 100%);
            color: #000000;
            border-color: var(--accent-green);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(159, 232, 112, 0.3);
        }

        .action-section {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* Google Translate Styling */
        
        /* Translation toggle button */
        .translate-toggle-btn {
            background: linear-gradient(135deg, #9FE870 0%, #9FE870 100%);
            border: 2px solid #9FE870;
            color: #000000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.3rem;
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            box-shadow: 0 4px 12px rgba(159, 232, 112, 0.4);
        }

        body.light-mode .translate-toggle-btn {
            background: linear-gradient(135deg, #7acc50 0%, #7acc50 100%);
            border: 2px solid #7acc50;
        }

        .translate-toggle-btn:hover {
            box-shadow: 0 6px 20px rgba(159, 232, 112, 0.6);
            transform: translateY(-3px);
        }

        .translate-toggle-btn:active {
            transform: scale(0.95);
        }

        .translate-toggle-btn:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(159, 232, 112, 0.3);
        }

        /* Dropdown container for Google Translate */
        .translate-dropdown {
            position: fixed;
            bottom: 90px;
            right: 30px;
            background: var(--secondary-bg);
            border: 2px solid var(--accent-green);
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            z-index: 998;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #google_translate_element {
            background: transparent;
            border: none;
            padding: 0;
        }

        .goog-te-gadget {
            font-family: 'Inter', sans-serif !important;
            font-size: 0.85rem !important;
            line-height: 1 !important;
        }

        .goog-te-gadget-simple {
            background-color: transparent !important;
            border: none !important;
            padding: 4px !important;
            font-size: 0.85rem !important;
            line-height: 1 !important;
        }

        .goog-te-gadget-simple .goog-te-menu-value {
            color: var(--text-primary) !important;
            font-weight: 600 !important;
            line-height: 1 !important;
        }

        .goog-te-gadget-simple .goog-te-menu-value span {
            color: var(--text-primary) !important;
            font-weight: 600 !important;
            line-height: 1 !important;
        }

        .goog-te-gadget-simple .goog-te-menu-value:hover {
            color: var(--accent-green) !important;
        }

        .goog-te-gadget-simple .goog-te-menu-value:hover span {
            color: var(--accent-green) !important;
        }

        .goog-te-gadget-icon {
            display: none !important;
        }

        /* Hide Google Translate banner */
        .goog-te-banner-frame.skiptranslate {
            display: none !important;
        }

        body {
            top: 0 !important;
        }

        /* Prevent translation of specific elements */
        .notranslate {
            /* This class prevents Google Translate from translating the element */
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            background-color: var(--search-bg);
            color: var(--search-text);
            border: 1px solid var(--card-border);
            padding: 12px 80px 12px 45px;
            border-radius: 12px;
            width: 280px;
            outline: none;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
        }

        .search-box input:focus {
            width: 320px;
            box-shadow: 0 0 0 4px rgba(159, 232, 112, 0.2);
            border-color: var(--accent-green);
            background-color: var(--secondary-bg);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
            font-size: 1.1rem;
        }

        .clear-search {
            position: absolute;
            right: 50px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            cursor: pointer;
            display: none;
            transition: all 0.3s;
            font-size: 1.1rem;
            z-index: 2;
        }

        .clear-search:hover {
            color: var(--accent-green);
            transform: translateY(-50%) scale(1.2);
        }

        .clear-search.visible {
            display: block;
        }

        /* --- NEW: VOICE SEARCH CSS --- */
        .voice-search-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1rem;
            z-index: 2;
        }

        .voice-search-icon:hover {
            color: var(--accent-green);
            transform: translateY(-50%) scale(1.2);
        }

        .voice-search-icon.listening {
            color: #ff4444; /* Turns red */
            animation: pulse-mic 1.5s infinite;
        }

        @keyframes pulse-mic {
            0% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.2); }
            100% { transform: translateY(-50%) scale(1); }
        }

        /* --- CHATBOT STYLES --- */
        [x-cloak] { display: none !important; }
        
        .bg-brand-gradient {
            background: linear-gradient(135deg, #9FE870 0%, #8AD95E 100%);
        }
        
        .text-brand-primary {
            color: #9FE870;
        }
        
        .chatbot-toggle-btn {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #9FE870 0%, #8AD95E 100%);
            box-shadow: 0 4px 12px rgba(159, 232, 112, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000000;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 999;
            border: 2px solid #9FE870;
            font-size: 1.3rem;
        }

        .chatbot-toggle-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(159, 232, 112, 0.6);
        }

        .chatbot-toggle-btn:active {
            transform: scale(0.95);
        }

        .chatbot-window {
            position: fixed;
            bottom: 180px;
            right: 30px;
            width: 90vw;
            max-width: 400px;
            height: 600px;
            max-height: 80vh;
            border-radius: 24px;
            background-color: #000000;
            border: 1px solid #2d5514;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 998;
        }

        body.light-mode .chatbot-window {
            background-color: var(--secondary-bg);
            border-color: var(--card-border);
        }

        .chatbot-header {
            padding: 12px 16px;
            background-color: #0f0f0f;
            border-bottom: 1px solid #2d5514;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        body.light-mode .chatbot-header {
            background-color: var(--secondary-bg);
            border-bottom-color: var(--card-border);
        }

        .chatbot-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        body.light-mode .chatbot-messages {
            background-color: var(--primary-bg);
        }

        .chatbot-message {
            max-width: 85%;
            padding: 12px;
            border-radius: 16px;
            font-size: 0.875rem;
            line-height: 1.5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .chatbot-message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #9FE870 0%, #8AD95E 100%);
            color: #000000;
            border-radius: 16px 16px 4px 16px;
            border: 1px solid #9FE870;
        }

        .chatbot-message.assistant {
            align-self: flex-start;
            background-color: #1a1a1a;
            color: #FFFFFF;
            border-radius: 16px 16px 16px 4px;
            border: 1px solid #2d5514;
        }

        body.light-mode .chatbot-message.assistant {
            background-color: var(--secondary-bg);
            color: var(--text-primary);
            border-color: var(--card-border);
        }

        .chatbot-loading {
            display: flex;
            gap: 4px;
            padding: 12px;
            background-color: #1a1a1a;
            border: 1px solid #2d5514;
            border-radius: 16px 16px 16px 4px;
            align-self: flex-start;
        }

        body.light-mode .chatbot-loading {
            background-color: var(--secondary-bg);
            border-color: var(--card-border);
        }

        .chatbot-loading-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #9FE870;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .chatbot-loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .chatbot-loading-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .chatbot-footer {
            padding: 16px;
            background-color: #0f0f0f;
            border-top: 1px solid #2d5514;
        }

        body.light-mode .chatbot-footer {
            background-color: var(--secondary-bg);
            border-top-color: var(--card-border);
        }

        .chatbot-input-form {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .chatbot-input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 12px;
            background-color: #1a1a1a;
            border: 1px solid #2d5514;
            color: #FFFFFF;
            font-size: 0.875rem;
            outline: none;
            transition: all 0.3s;
        }

        .chatbot-input:focus {
            border-color: #9FE870;
            box-shadow: 0 0 0 2px rgba(159, 232, 112, 0.2);
        }

        .chatbot-input::placeholder {
            color: #b8d6a0;
        }

        body.light-mode .chatbot-input {
            background-color: var(--search-bg);
            border-color: var(--card-border);
            color: var(--text-primary);
        }

        body.light-mode .chatbot-input::placeholder {
            color: var(--text-secondary);
        }

        .chatbot-send-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #9FE870 0%, #8AD95E 100%);
            color: #000000;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(159, 232, 112, 0.3);
        }

        .chatbot-send-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .chatbot-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .chatbot-window {
                right: 15px;
                bottom: 165px;
                width: calc(100vw - 30px);
            }
            
            .chatbot-toggle-btn {
                right: 15px;
                bottom: 85px;
                width: 50px;
                height: 50px;
            }

            .translate-toggle-btn {
                bottom: 15px;
            }

            .translate-dropdown {
                bottom: 75px;
            }
        }

        /* --- 3. MAIN CONTENT STYLES --- */
        .news-banner {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            color: var(--text-primary);
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .news-banner i { 
            font-size: 2.2rem;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .news-banner h1 { 
            font-size: 2rem; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        #main-content.all-announcement .news-banner { background: linear-gradient(135deg, var(--banner-all-announcement) 0%, var(--secondary-bg) 100%); }
        #main-content.emergency .news-banner { background: linear-gradient(135deg, var(--banner-emergency) 0%, #b71c1c 100%); }
        #main-content.deadline .news-banner { background: linear-gradient(135deg, var(--banner-deadline) 0%, #7acc50 100%); color: #000000; }
        #main-content.news .news-banner { background: linear-gradient(135deg, var(--banner-news-updates) 0%, var(--secondary-bg) 100%); }
        #main-content.memo .news-banner { background: linear-gradient(135deg, var(--banner-memo) 0%, var(--secondary-bg) 100%); }
        #main-content.notices .news-banner { background: linear-gradient(135deg, var(--banner-notices) 0%, var(--accent-green) 100%); color: #000000; }

        /* Light mode banner text adjustment */
        body.light-mode #main-content.emergency .news-banner {
            color: #FFFFFF;
        }

        .search-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-green) 0%, #7acc50 100%);
            color: #000000;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-left: 15px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(159, 232, 112, 0.3);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--secondary-bg);
            padding: 16px 24px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid var(--card-border);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        }

        .filter-categories {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
        }
        
        .filter-link:hover {
            color: var(--text-primary);
            background-color: var(--hover-bg);
            transform: translateY(-2px);
        }
        
        .filter-link.active-filter {
            color: #000000;
            background: linear-gradient(135deg, var(--accent-green) 0%, #7acc50 100%);
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(159, 232, 112, 0.3);
        }

        .filter-button {
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
            padding: 8px 16px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-button:hover {
            color: var(--accent-green);
            background-color: var(--hover-bg);
        }

        .filter-button i {
            font-size: 1.1rem;
        }

        /* Filter Panel Styles */
        .filter-panel {
            display: none;
            background-color: var(--secondary-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            animation: slideDown 0.3s ease;
        }

        .filter-panel.active {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .filter-section {
            margin-bottom: 20px;
        }

        .filter-section:last-child {
            margin-bottom: 0;
        }

        .filter-section-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-option {
            padding: 8px 16px;
            border-radius: 10px;
            background-color: var(--primary-bg);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-option:hover {
            background-color: var(--hover-bg);
            color: var(--text-primary);
            border-color: var(--accent-green);
        }

        .filter-option.active {
            background: linear-gradient(135deg, var(--accent-green) 0%, #7acc50 100%);
            color: #000000;
            border-color: var(--accent-green);
            font-weight: 600;

    <script>
        const supabaseUrl = 'https://dqtictujkhxultwoaqaw.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxdGljdHVqa2h4dWx0d29hcWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgyOTU1MjksImV4cCI6MjA3Mzg3MTUyOX0.DsnJZ9ylCBlTeVp_KdgRq71cV0f7MojOfuWg1MVGS5I';
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        let currentCategory = 'all-announcement';
        let allAnnouncements = [];
        let filteredAnnouncements = [];
        let currentSearchTerm = '';
        let currentPage = 1;
        const itemsPerPage = 12;
        let currentSortOrder = 'posted-newest'; // Default sort by posted date, newest first

        function toggleFilterPanel() {
            const filterPanel = document.getElementById('filterPanel');
            filterPanel.classList.toggle('active');
        }

        function setSortOrder(order) {
            currentSortOrder = order;
            
            // Update active state on buttons
            document.querySelectorAll('.filter-option[data-sort]').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.filter-option[data-sort="${order}"]`).classList.add('active');
            
            // Apply filtering and sorting
            applyFiltersAndSort();
            displayAnnouncements(filteredAnnouncements, currentSearchTerm);
            updatePagination();
        }



        function applyFiltersAndSort() {
            // Start with all announcements or search results
            if (currentSearchTerm) {
                // If there's a search term, filter from allAnnouncements
                filteredAnnouncements = allAnnouncements.filter(announcement => {
                    const userName = announcement.members?.full_name || announcement.posted_by || '';
                    const formattedDate = formatDate(announcement.scheduled_date).toLowerCase();

                    return (
                        (announcement.title && announcement.title.toLowerCase().includes(currentSearchTerm)) ||
                        (announcement.description && announcement.description.toLowerCase().includes(currentSearchTerm)) ||
                        (announcement.summary && announcement.summary.toLowerCase().includes(currentSearchTerm)) ||
                        (announcement.category && announcement.category.toLowerCase().includes(currentSearchTerm)) ||
                        (announcement.target_audience && announcement.target_audience.toLowerCase().includes(currentSearchTerm)) ||
                        (announcement.why && announcement.why.toLowerCase().includes(currentSearchTerm)) ||
                        (announcement.location && announcement.location.toLowerCase().includes(currentSearchTerm)) ||
                        (userName && userName.toLowerCase().includes(currentSearchTerm)) ||
                        (formattedDate && formattedDate.includes(currentSearchTerm))
                    );
                });
            } else {
                filteredAnnouncements = [...allAnnouncements];
            }

            // Apply target audience filter
            if (currentSortOrder.startsWith('audience-')) {
                const audienceType = currentSortOrder.replace('audience-', '');
                if (audienceType !== 'all') {
                    filteredAnnouncements = filteredAnnouncements.filter(announcement => {
                        const audience = (announcement.target_audience || '').toLowerCase();
                        return audience.includes(audienceType);
                    });
                }
            }

            // Apply sorting
            sortAnnouncements();
        }

        function sortAnnouncements() {
            // Only sort by date if not filtering by audience
            if (!currentSortOrder.startsWith('audience-')) {
                filteredAnnouncements.sort((a, b) => {
                    let dateA, dateB;
                    
                    // Determine which date field to use
                    if (currentSortOrder === 'posted-newest' || currentSortOrder === 'posted-oldest') {
                        dateA = new Date(a.created_at);
                        dateB = new Date(b.created_at);
                    } else if (currentSortOrder === 'scheduled-newest' || currentSortOrder === 'scheduled-oldest') {
                        dateA = new Date(a.scheduled_date);
                        dateB = new Date(b.scheduled_date);
                    }
                    
                    // Determine sort direction
                    if (currentSortOrder === 'posted-newest' || currentSortOrder === 'scheduled-newest') {
                        return dateB - dateA; // Newest first
                    } else {
                        return dateA - dateB; // Oldest first
                    }
                });
            } else {
                // When filtering by audience, still sort by posted date (newest first) as secondary sort
                filteredAnnouncements.sort((a, b) => {
                    const dateA = new Date(a.created_at);
                    const dateB = new Date(b.created_at);
                    return dateB - dateA;
                });
            }
        }

            if (body.classList.contains('light-mode')) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                localStorage.setItem('theme', 'light');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                localStorage.setItem('theme', 'dark');
            }
        }

            const savedTheme = localStorage.getItem('theme');
            const body = document.body;
            const themeIcon = document.getElementById('theme-icon');
            
            if (savedTheme === 'light') {
                body.classList.add('light-mode');
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            }
        }

            TRANSLATION TOGGLE SYSTEM

         * Initialize translation dropdown toggle
         */
        function initTranslationToggle() {
            const translateBtn = document.getElementById('translate-toggle-btn');
            const translateDropdown = document.getElementById('google_translate_element');
            
            if (!translateBtn || !translateDropdown) {
                console.log('Translation elements not found');
                return;
            }

            console.log('Translation toggle initialized');

            // Toggle dropdown when button is clicked
            translateBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                console.log('Translation button clicked');
                const isVisible = translateDropdown.style.display === 'block';
                translateDropdown.style.display = isVisible ? 'none' : 'block';
                console.log('Dropdown display:', translateDropdown.style.display);
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', function(event) {
                if (!event.target.closest('#translate-toggle-btn') && 
                    !event.target.closest('#google_translate_element')) {
                    if (translateDropdown.style.display === 'block') {
                        translateDropdown.style.display = 'none';
                    }
                }
            });

            // Ensure Google Translate widget is loaded
            const checkGoogleTranslate = setInterval(function() {
                const googleWidget = translateDropdown.querySelector('.goog-te-gadget');
                if (googleWidget) {
                    console.log('Google Translate widget loaded');
                    clearInterval(checkGoogleTranslate);
                }
            }, 500);

            // Clear interval after 10 seconds
            setTimeout(function() {
                clearInterval(checkGoogleTranslate);
            }, 10000);
        }

        async function loadAnnouncements(category = 'all-announcement', preservePage = false) {
            try {
                console.log('📡 Loading announcements for category:', category);
                
                let query = supabaseClient
    .from('announcements')
    .select(`
        *,
        members:posted_by_user_id (
            full_name,
            avatar_url
        )
    `)
    .eq('archived', false)
    .order('scheduled_date', { ascending: false });

                if (category !== 'all-announcement') {
                    query = query.ilike('category', category);
                }

                const { data, error } = await query;

                if (error) {
                    console.error('❌ Supabase error:', error);
                    throw error;
                }

                console.log('✅ Loaded announcements:', data);
                console.log('📊 Total found:', data ? data.length : 0);
                
                allAnnouncements = data || [];
                
                if (!preservePage) {
                    currentPage = 1;
                }
                
                // Apply filters and sorting
                applyFiltersAndSort();
                displayAnnouncements(filteredAnnouncements, currentSearchTerm);
                updatePagination();
                
            } catch (error) {
                console.error('❌ Error loading announcements:', error);
                document.getElementById('newsGrid').innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 15px;"></i>
                        <h3>Error Loading Announcements</h3>
                        <p style="margin-top: 10px;">${error.message || 'Unknown error occurred'}</p>
                    </div>
                `;
            }
        }

        function updatePagination() {
            const totalPages = Math.ceil(filteredAnnouncements.length / itemsPerPage);
            const pageNumbersContainer = document.getElementById('page-numbers');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const paginationContainer = document.getElementById('pagination-container');

            if (totalPages <= 1) {
                paginationContainer.style.display = 'none';
                return;
            } else {
                paginationContainer.style.display = 'flex';
            }

            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;

            let pageNumbersHTML = '';
            
            if (currentPage > 2) {
                pageNumbersHTML += `<button class="pagination-btn" onclick="goToPage(1)">1</button>`;
                if (currentPage > 3) {
                    pageNumbersHTML += `<span class="pagination-info">...</span>`;
                }
            }

            for (let i = Math.max(1, currentPage - 1); i <= Math.min(totalPages, currentPage + 1); i++) {
                pageNumbersHTML += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }

            if (currentPage < totalPages - 1) {
                if (currentPage < totalPages - 2) {
                    pageNumbersHTML += `<span class="pagination-info">...</span>`;
                }
                pageNumbersHTML += `<button class="pagination-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }

            pageNumbersContainer.innerHTML = pageNumbersHTML;
        }

        function goToPage(page) {
            currentPage = page;
            displayAnnouncements(filteredAnnouncements, currentSearchTerm);
            updatePagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function previousPage() {
            if (currentPage > 1) {
                goToPage(currentPage - 1);
            }
        }

        function nextPage() {
            const totalPages = Math.ceil(filteredAnnouncements.length / itemsPerPage);
            if (currentPage < totalPages) {
                goToPage(currentPage + 1);
            }
        }

        function displayAnnouncements(announcements, searchTerm = '') {
            const grid = document.getElementById('newsGrid');
            
            if (announcements.length === 0) {
                if (searchTerm) {
                    grid.innerHTML = `
                        <div class="loading">
                            🔍 No results found for "${escapeHtml(searchTerm)}"
                            <br><br>
                            <button class="btn btn-primary" onclick="clearSearch()" style="padding: 12px 24px; background: linear-gradient(135deg, var(--accent-green) 0%, #7acc50 100%); color: #000000; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; box-shadow: 0 4px 12px rgba(159, 232, 112, 0.3);">Clear Search</button>
                        </div>`;
                } else {
                    grid.innerHTML = '<div class="loading">📭 No announcements found</div>';
                }
                document.getElementById('pagination-container').style.display = 'none';
                return;
            }
            
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedAnnouncements = announcements.slice(startIndex, endIndex);
            
            grid.innerHTML = paginatedAnnouncements.map(announcement => {
                const badgeClass = `badge-${(announcement.category || 'news').toLowerCase().replace(' ', '-')}`;
                const postedByUser = announcement.members;
                const userName = postedByUser?.full_name || announcement.posted_by || 'Unknown User';
                const userAvatar = postedByUser?.avatar_url || 'https://cdn-icons-png.flaticon.com/512/847/847969.png';
                
                return `
                <div class="news-card ${searchTerm ? 'highlight' : ''}" onclick="openViewModal(${announcement.id})">
                    <span class="card-category-badge ${badgeClass}">${escapeHtml(announcement.category)}</span>
                    <div class="card-content">
                        <p class="date">
                            <i class="fas fa-calendar"></i> Posted at: 
                            ${formatDate(announcement.created_at)}
                            
                        </p>
                        <p class="date">
                            <i class="fas fa-calendar"></i> Date Scheduled: 
                            ${formatDate(announcement.scheduled_date)}
                        </p>
                        <h3 class="title">${highlightText(escapeHtml(announcement.title), searchTerm)}</h3>
                        
                        <p class="description">${highlightText(escapeHtml(announcement.summary || truncateText(announcement.description, 120)) || 'No description provided', searchTerm)}</p>
                        
                        <div class="posted-by">
                            <img src="${escapeHtml(userAvatar)}" 
                                 alt="${escapeHtml(userName)}"
                                 onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">
                            <span>Posted by <strong>${highlightText(escapeHtml(userName), searchTerm)}</strong></span>
                        </div>
                    </div>
                    <div class="card-footer">
                        ${announcement.target_audience ? `
                            <span class="audience">
                                <i class="fas fa-users"></i>
                                ${highlightText(escapeHtml(announcement.target_audience), searchTerm)}
                            </span>
                        ` : '<span></span>'}
                        <span class="view-details">
                            View Details <i class="fas fa-arrow-right"></i>
                        </span>
                    </div>
                </div>
            `}).join('');
        }

        // ============================================
        // MODAL FUNCTIONS (UPDATED PER REQUEST)
        // ============================================
        function openViewModal(id) {
            const announcement = allAnnouncements.find(a => a.id === id);
            if (!announcement) return;
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            
            // Set modal title
            document.getElementById('modalTitle').innerHTML = highlightText(escapeHtml(announcement.title), searchTerm);

            // Get modal body element
            const modalBody = document.getElementById('viewModalBody');
            
            // Use .replace(/\n/g, '<br>') to preserve line breaks in the description
            // Added icons as requested
            modalBody.innerHTML = `
                <p class="date">
                    <i class="fas fa-file-export"></i>
                    <strong>Date posted:</strong> ${formatDate(announcement.created_at)}
                </p>
                <p class="date">
                    <i class="fas fa-calendar-check"></i>
                    <strong>Date scheduled:</strong> ${formatDate(announcement.scheduled_date)}
                </p>
                <p class="date">
                    <i class="fas fa-question-circle"></i>
                    <strong>Why:</strong> ${highlightText(escapeHtml(announcement.why) || 'N/A', searchTerm)}
                </p>
                <p class="date">
                    <i class="fas fa-map-marker-alt"></i>
                    <strong>Location:</strong> ${highlightText(escapeHtml(announcement.location) || 'N/A', searchTerm)}
                </p>
                <p class="description">
                    <strong><i class="fas fa-align-left"></i> Full Content:</strong>
                    ${highlightText(escapeHtml(announcement.description).replace(/\n/g, '<br>') || 'No description provided', searchTerm)}
                </p>
            `;
            
            document.getElementById('viewModal').classList.add('active');
        }

        function closeViewModal() {
            document.getElementById('viewModal').classList.remove('active');
        }
        // ============================================
        // END MODAL FUNCTIONS
        // ============================================

function searchAnnouncements(preservePage = false) {
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearch');
    const searchBadge = document.getElementById('searchBadge');
    const searchTerm = searchInput.value.toLowerCase().trim();
    
    currentSearchTerm = searchTerm;
    
    if (searchTerm) {
        clearBtn.classList.add('visible');
    } else {
        clearBtn.classList.remove('visible');
        searchBadge.style.display = 'none';
        if (!preservePage) {
            currentPage = 1;
        }
        applyFiltersAndSort();
        displayAnnouncements(filteredAnnouncements);
        updatePagination();
        return;
    }
    
    console.log('🔍 Searching for:', searchTerm);
    
    if (!preservePage) {
        currentPage = 1;
    }
    
    // Apply filters and sorting (includes search)
    applyFiltersAndSort();
    
    console.log(`📊 Found ${filteredAnnouncements.length} results`);
    
    if (filteredAnnouncements.length > 0) {
        searchBadge.textContent = `${filteredAnnouncements.length} result${filteredAnnouncements.length !== 1 ? 's' : ''}`;
        searchBadge.style.display = 'inline-block';
    } else {
        searchBadge.style.display = 'none';
    }
    
    displayAnnouncements(filteredAnnouncements, searchTerm);
    updatePagination();
}

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearSearch').classList.remove('visible');
            document.getElementById('searchBadge').style.display = 'none';
            currentSearchTerm = '';
            currentPage = 1;
            applyFiltersAndSort(); // Apply current filters and sort order
            displayAnnouncements(filteredAnnouncements);
            updatePagination();
        }

        // ============================================
        // VOICE SEARCH IMPLEMENTATION
        // ============================================
        function startVoiceSearch() {
            console.log('🎤 Voice search button clicked');
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                console.error('❌ Speech Recognition not supported');
                alert("Sorry, your browser doesn't support voice search. Please try using Google Chrome or Microsoft Edge.");
                return;
            }

            console.log('✅ Speech Recognition supported');
            
            const recognition = new SpeechRecognition();
            const micIcon = document.getElementById('voiceSearchBtn');
            const searchInput = document.getElementById('searchInput');

            if (!micIcon) {
                console.error('❌ Voice search button not found');
                return;
            }

            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                console.log('🎤 Voice recognition started.');
                micIcon.classList.remove('fa-microphone');
                micIcon.classList.add('fa-microphone-lines', 'listening');
                searchInput.placeholder = "Listening...";
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                console.log('🎤 Transcript:', transcript);
                const cleanTranscript = transcript.replace(/\.$/, '');
                searchInput.value = cleanTranscript;
                searchAnnouncements();
            };

            recognition.onerror = function(event) {
                console.error('🎤 Voice recognition error:', event.error);
                micIcon.classList.remove('fa-microphone-lines', 'listening');
                micIcon.classList.add('fa-microphone');
                searchInput.placeholder = "Search announcements...";
                
                if (event.error === 'not-allowed') {
                    alert('Microphone access was denied. Please allow microphone permissions in your browser to use voice search.');
                } else if (event.error === 'no-speech') {
                    alert('No speech detected. Please try again.');
                } else {
                    alert('Voice recognition error: ' + event.error);
                }
            };

            recognition.onend = function() {
                console.log('🎤 Voice recognition ended.');
                micIcon.classList.remove('fa-microphone-lines', 'listening');
                micIcon.classList.add('fa-microphone');
                searchInput.placeholder = "Search announcements...";
            };

            try {
                recognition.start();
                console.log('🎤 Recognition.start() called');
            } catch (error) {
                console.error('❌ Error starting recognition:', error);
                alert('Failed to start voice recognition: ' + error.message);
            }
        }

        function highlightText(text, searchTerm) {
            if (!searchTerm || !text) return text;
            const regex = new RegExp(`(${escapeRegex(searchTerm)})`, 'gi');
            return text.replace(regex, '<span class="highlight-text">$1</span>');
        }

        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        async function showCategory(categoryId) {
            currentCategory = categoryId;
            currentPage = 1;
            
            const mainContent = document.getElementById('main-content');
            mainContent.className = categoryId.toLowerCase().replace('-', ' ');
            
            const pageTitle = document.getElementById('page-title');
            const banner = document.querySelector('.news-banner');
            
            const categoryConfig = {
                'all-announcement': { title: 'All Announcements', icon: 'fa-bullhorn' },
                'Emergency': { title: 'Emergency Alerts', icon: 'fa-exclamation-triangle' },
                'Deadline': { title: 'Deadlines', icon: 'fa-calendar-times' },
                'Memo': { title: 'Memos', icon: 'fa-clipboard-list' },
                'Notices': { title: 'Notices', icon: 'fa-info-circle' },
                'News': { title: 'News Updates', icon: 'fa-newspaper' }
            };
            
            const config = categoryConfig[categoryId] || categoryConfig['all-announcement'];
            pageTitle.textContent = config.title;
            banner.querySelector('i').className = `fas ${config.icon}`;
            
            document.querySelectorAll('.filter-link').forEach(link => {
                link.classList.remove('active-filter');
            });
            
            document.querySelectorAll(`.filter-link[data-category="${categoryId}"]`).forEach(link => {
                link.classList.add('active-filter');
            });
            
            clearSearch();
            await loadAnnouncements(categoryId);
        }

        function formatDate(dateString) {
            if (!dateString) return 'No date';
            const date = new Date(dateString);
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        function truncateText(text, maxLength) {
            if (!text) return '';
            if (text.length <= maxLength) return text;
            return text.substring(0, maxLength) + '...';
        }

        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (document.querySelector('.modal.active')) {
                    closeViewModal();
                } else if (currentSearchTerm) {
                    clearSearch();
                }
            }
            
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });

        // Auto-refresh disabled
        // setInterval(() => {
        //     console.log(`🔄 Auto-refreshing announcements on page ${currentPage}...`);
        //     loadAnnouncements(currentCategory, true);
        // }, 10000);

        // ============================================
        // CHATBOT FUNCTIONALITY
        // ============================================
        function initChatbot() {
            return {
                isOpen: false,
                userInput: '',
                isLoading: false,
                sessionId: 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                messages: [
                    { role: 'assistant', content: 'Hi! Welcome to CentranounceIT Hub. I can help you with announcements, events, deadlines, and campus information. What would you like to know?' }
                ],
                
                async sendMessage() {
                    if (!this.userInput.trim()) return;

                    this.messages.push({ role: 'user', content: this.userInput });
                    const currentInput = this.userInput;
                    this.userInput = '';
                    this.isLoading = true;

                    this.scrollToBottom();

                    try {
                        const announcementContext = await this.fetchRelevantAnnouncements(currentInput);
                        
                        const systemMessage = {
                            role: 'system',
                            content: `You are the CentranounceIT Hub Assistant, helping students with campus announcements and information.

CURRENT ANNOUNCEMENTS DATABASE:
${announcementContext}

INSTRUCTIONS:
- Use the announcement data above to answer questions about campus events, deadlines, and news
- If asked about specific announcements, reference the data provided
- Be helpful, friendly, and concise
- If you don't have information about something, suggest checking the dashboard
- Format dates in a readable way (e.g., "January 15, 2024")
- Highlight important deadlines and emergency announcements`
                        };

                        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer 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'
                            },
                            body: JSON.stringify({
                                model: 'llama-3.3-70b-versatile',
                                messages: [
                                    systemMessage,
                                    ...this.messages.map(msg => ({
                                        role: msg.role,
                                        content: msg.content
                                    }))
                                ],
                                temperature: 0.7,
                                max_tokens: 1024
                            })
                        });

                        if (!response.ok) {
                            throw new Error(`API Error: ${response.status}`);
                        }

                        const data = await response.json();
                        const assistantMessage = data.choices[0].message.content;

                        this.messages.push({ 
                            role: 'assistant', 
                            content: assistantMessage
                        });

                        await this.saveChatHistory(currentInput, assistantMessage);

                    } catch (error) {
                        console.error('Chat Error:', error);
                        this.messages.push({ 
                            role: 'assistant', 
                            content: 'Sorry, I encountered an error. Please try again.' 
                        });
                    } finally {
                        this.isLoading = false;
                        this.scrollToBottom();
                    }
                },

                async fetchRelevantAnnouncements(userQuery) {
                    try {
                        const { data, error } = await supabaseClient
                            .from('announcements')
                            .select(`
                                id,
                                title,
                                description,
                                summary,
                                category,
                                scheduled_date,
                                target_audience,
                                location,
                                created_at,
                                members:posted_by_user_id (
                                    full_name
                                )
                            `)
                            .eq('archived', false)
                            .order('scheduled_date', { ascending: false })
                            .limit(20);

                        if (error) {
                            console.error('Supabase error:', error);
                            return 'No announcements available at the moment.';
                        }

                        if (!data || data.length === 0) {
                            return 'No announcements found.';
                        }

                        const formattedAnnouncements = data.map((ann, index) => {
                            const postedBy = ann.members?.full_name || 'Unknown';
                            return `
[${index + 1}] ${ann.title}
Category: ${ann.category || 'General'}
Date: ${new Date(ann.scheduled_date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}
Audience: ${ann.target_audience || 'All'}
${ann.location ? `Location: ${ann.location}` : ''}
Summary: ${ann.summary || ann.description || 'No details available'}
Posted by: ${postedBy}
---`;
                        }).join('\n');

                        return formattedAnnouncements;

                    } catch (error) {
                        console.error('Error fetching announcements:', error);
                        return 'Unable to fetch announcements at this time.';
                    }
                },

                async saveChatHistory(userMessage, assistantResponse) {
                    try {
                        const { error } = await supabaseClient
                            .from('chat_history')
                            .insert([{
                                session_id: this.sessionId,
                                user_message: userMessage,
                                assistant_response: assistantResponse,
                                has_security_concern: false,
                                created_at: new Date().toISOString()
                            }]);

                        if (error) {
                            console.error('Error saving chat history:', error);
                        }
                    } catch (error) {
                        console.error('Error saving to database:', error);
                    }
                },

                scrollToBottom() {
                    this.$nextTick(() => {
                        const container = document.getElementById('chatbot-messages-container');
                        if (container) {
                            container.scrollTop = container.scrollHeight;
                        }
                    });
                }
            }
        }
    </script>

    <!-- Chatbot Widget -->
    <div x-data="initChatbot()" x-cloak>
        <button 
            @click="isOpen = !isOpen"
            class="chatbot-toggle-btn"
            aria-label="Toggle chatbot"
        >
            <i x-show="!isOpen" class="fa-solid fa-robot"></i>
            <i x-show="isOpen" class="fa-solid fa-xmark"></i>
        </button>

        <div 
            x-show="isOpen"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 scale-90 translate-y-10"
            x-transition:enter-end="opacity-100 scale-100 translate-y-0"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100 scale-100 translate-y-0"
            x-transition:leave-end="opacity-0 scale-90 translate-y-10"
            class="chatbot-window"
        >
            <div class="chatbot-header">
                <div>
                    <h2 class="font-bold text-white text-sm tracking-wide">Chatbot</h2>
                    <p class="text-[11px] font-medium text-brand-primary">Your Campus Assistant</p>
                </div>
                <button @click="isOpen = false" style="color: var(--text-secondary);" class="hover:opacity-70 transition-colors flex-shrink-0 w-6 h-6 flex items-center justify-center">
                    <i class="fa-solid fa-minus text-sm"></i>
                </button>
            </div>

            <div id="chatbot-messages-container" class="chatbot-messages">
                <template x-for="(msg, index) in messages" :key="index">
                    <div :class="'chatbot-message ' + msg.role">
                        <p class="whitespace-pre-wrap" x-text="msg.content"></p>
                    </div>
                </template>

                <div x-show="isLoading" class="chatbot-loading">
                    <div class="chatbot-loading-dot"></div>
                    <div class="chatbot-loading-dot"></div>
                    <div class="chatbot-loading-dot"></div>
                </div>
            </div>

            <div class="chatbot-footer">
                <form @submit.prevent="sendMessage()" class="chatbot-input-form">
                    <input 
                        type="text"
                        x-model="userInput" 
                        placeholder="Ask about announcements, events..." 
                        class="chatbot-input"
                    >
                    <button 
                        type="submit" 
                        :disabled="!userInput.trim() || isLoading"
                        class="chatbot-send-btn"
                    >
                        <i class="fa-solid fa-paper-plane text-xs"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
